<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Control Moto - Viajes y Mantenimiento</title>

  <style>
    body { 
      font-family: system-ui, Arial, sans-serif; 
      margin: 10px; 
      max-width: 100%; 
      padding: 0;
    }

    h1 { margin-bottom: 5px; font-size: 24px; }
    h2 { font-size: 20px; }
    h3 { font-size: 18px; }
    h4 { font-size: 16px; }

    .row { 
      display: flex; 
      gap: 8px; 
      flex-wrap: wrap; 
      align-items: center; 
    }

    input, button, textarea { 
      padding: 12px; 
      font-size: 16px; 
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    input, textarea { 
      flex: 1; 
      min-width: 140px; 
    }

    textarea { 
      min-height: 44px; 
    }

    button { 
      cursor: pointer; 
      background: #2563eb;
      color: white;
      border: none;
      transition: background 0.2s;
    }

    button:hover {
      background: #1d4ed8;
    }

    table { 
      width: 100%; 
      border-collapse: collapse; 
      margin-top: 12px; 
      font-size: 14px;
    }

    th, td { 
      border-bottom: 1px solid #ddd; 
      padding: 10px 8px; 
      text-align: left; 
      vertical-align: top;
    }

    .card { 
      border: 1px solid #ddd; 
      border-radius: 12px; 
      padding: 15px; 
      margin: 10px 0; 
      background: white;
    }

    .muted { color: #666; font-size: 14px; }
    .danger { color: #b00020; }
    .right { text-align: right; }

    .tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tab {
      border: 1px solid #ddd;
      background: #fff;
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 14px;
      color: #111;
    }

    .tab.active {
      font-weight: bold;
      background: #2563eb;
      color: white;
      border-color: #2563eb;
    }

    .pill {
      border: 1px solid #ddd;
      background: #fff;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 14px;
      color: #111;
    }

    .pill.active {
      font-weight: bold;
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 50;
    }

    .modal.active { display: flex; }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
    }

    .modal-content {
      position: relative;
      width: min(900px, 100%);
      max-height: 85vh;
      overflow: auto;
      background: #fff;
      border-radius: 12px;
      border: 1px solid #ddd;
      padding: 14px;
    }

    .hidden { display: none; }
    .section { display: none; }
    .section.active { display: block; }

    /* Responsive improvements */
    @media (max-width: 768px) {
      body {
        margin: 5px;
        padding: 0;
      }

      h1 { font-size: 20px; }
      h2 { font-size: 18px; }
      h3 { font-size: 16px; }

      .card {
        padding: 12px;
        margin: 8px 0;
        border-radius: 8px;
      }

      .row {
        gap: 6px;
      }

      input, button, textarea {
        padding: 10px;
        font-size: 14px;
      }

      input, textarea {
        min-width: 120px;
      }

      button {
        padding: 10px 14px;
        font-size: 14px;
      }

      table {
        font-size: 12px;
      }

      th, td {
        padding: 8px 6px;
      }

      .tab {
        padding: 6px 12px;
        font-size: 12px;
      }

      .muted {
        font-size: 12px;
      }
    }

    @media (max-width: 480px) {
      body {
        margin: 2px;
      }

      h1 { font-size: 18px; }
      h2 { font-size: 16px; }
      h3 { font-size: 14px; }

      .card {
        padding: 10px;
        margin: 5px 0;
      }

      .row {
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
      }

      input, button, textarea {
        width: 100%;
        box-sizing: border-box;
      }

      input, textarea {
        min-width: auto;
      }

      button {
        padding: 12px;
        font-size: 16px;
      }

      table {
        font-size: 11px;
      }

      th, td {
        padding: 6px 4px;
      }

      .tabs {
        justify-content: center;
      }

      .tab {
        flex: 1;
        text-align: center;
        padding: 8px 4px;
        font-size: 11px;
      }
    }

    /* Responsive summary cards */
    @media (max-width: 768px) {
      .summary-cards {
        flex-direction: column !important;
        gap: 15px !important;
      }

      .summary-card {
        padding: 12px !important;
      }

      .summary-card h4 {
        font-size: 14px !important;
      }

      .summary-stats {
        gap: 15px !important;
      }

      .summary-stat {
        min-width: 80px;
      }

      .summary-stat .value {
        font-size: 20px !important;
      }

      .summary-stat .label {
        font-size: 11px !important;
      }
    }

    @media (max-width: 480px) {
      .summary-stats {
        justify-content: space-around !important;
        gap: 10px !important;
      }

      .summary-stat {
        text-align: center;
        flex: 1;
      }

      .summary-stat .value {
        font-size: 18px !important;
      }
    }
  </style>
</head>

<body>

<h1>🏍 Control de Moto</h1>
<p class="muted">Viajes + Mantenimiento (GitHub Pages + Supabase)</p>

<div class="card" id="loginCard">
  <h2>Iniciar sesión</h2>
  <div class="row">
    <input id="email" type="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Contraseña" />
    <button id="btnSignup">Crear cuenta</button>
    <button id="btnLogin">Entrar</button>
  </div>
  <p id="authMsg" class="muted"></p>
</div>

<div id="logoutSection" style="display:none; text-align: right; margin-bottom: 10px;">
  <button id="btnLogout" style="background: #dc2626;">Salir</button>
</div>

<div id="app" class="card" style="display:none;">

  <div class="row" style="justify-content: space-between;">
    <h2>Panel</h2>
    <div class="tabs">
      <button id="tabViajes" class="tab active">Viajes</button>
      <button id="tabMant" class="tab">Mantenimiento</button>
    </div>
  </div>

  <!-- ================= VIAJES ================= -->
  <div id="secViajes" class="section active">

    <h3>Registrar viaje</h3>
    <div class="row">
      <input id="fecha" type="date" />
      <input id="inicio" placeholder="Inicio" />
      <input id="destino" placeholder="Destino" />
      <input id="km" type="number" step="0.1" placeholder="KM" />
      <input id="costo" type="number" step="0.01" placeholder="Costo" />
      <button id="btnAdd">Guardar</button>
    </div>

    <div class="row" style="margin-top:20px; justify-content: space-between;">
      <div class="row">
        <button id="pillMes" class="pill active">Mes</button>
        <button id="pillAnio" class="pill">Año</button>
      </div>
      <button id="btnOpenHistorial" style="background:#111;">Ver historial</button>
    </div>

    <div class="card" style="margin-top:12px;">
      <div class="row" id="controlsMes">
        <input id="mes" type="month" />
        <button id="btnRefresh">Ver</button>
      </div>

      <div class="row hidden" id="controlsAnio">
        <input id="anioResumen" type="number" min="2020" max="2099" placeholder="Año" />
        <button id="btnRefreshAnualTabla">Ver</button>
      </div>

      <div id="resumen" class="muted" style="margin-top:10px;"></div>
      <div id="ultimosViajes" class="muted" style="margin-top:10px;"></div>
      <div id="resumenAnualTabla" class="muted hidden" style="margin-top:10px;"></div>
    </div>

    <div id="modalHistorial" class="modal">
      <div class="modal-backdrop" id="modalHistorialBackdrop"></div>
      <div class="modal-content">
        <div class="row" style="justify-content: space-between;">
          <h3 style="margin:0;">Historial completo</h3>
          <button id="btnCloseHistorial" style="background:#dc2626;">Cerrar</button>
        </div>
        <div class="row" style="margin-top:10px; margin-bottom: 10px;">
          <input id="mesHistorial" type="month" />
          <button id="btnRefreshHistorial">Actualizar</button>
        </div>
        <div id="tablaHistorial"></div>
      </div>
    </div>
  </div>

  <!-- ================= MANTENIMIENTO ================= -->
  <div id="secMant" class="section">

    <h3>Registrar mantenimiento</h3>
    <div class="row">
      <input id="mFecha" type="date" />
      <textarea id="mDesc" placeholder="¿Qué se hizo?"></textarea>
      <input id="mCosto" type="number" step="0.01" placeholder="Costo" />
      <button id="btnAddMant">Guardar</button>
    </div>

    <div class="card" style="margin-top:12px;">
      <div class="row">
        <input id="mesMant" type="month" />
        <button id="btnRefreshMant">Ver</button>
        <button id="btnOpenHistorialMant" style="background:#111;">Ver historial</button>
      </div>
      <div id="resumenMant" class="muted" style="margin-top:10px;"></div>
      <div id="ultimosMant" class="muted" style="margin-top:10px;"></div>
    </div>

    <div id="modalHistorialMant" class="modal">
      <div class="modal-backdrop" id="modalHistorialMantBackdrop"></div>
      <div class="modal-content">
        <div class="row" style="justify-content: space-between;">
          <h3 style="margin:0;">Historial mantenimiento</h3>
          <button id="btnCloseHistorialMant" style="background:#dc2626;">Cerrar</button>
        </div>
        <div class="row" style="margin-top:10px; margin-bottom: 10px;">
          <input id="mesHistorialMant" type="month" />
          <button id="btnRefreshHistorialMant">Actualizar</button>
        </div>
        <div id="tablaHistorialMant"></div>
      </div>
    </div>
  </div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://punkkhbrdczughyplqpe.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1bmtraGJyZGN6dWdoeXBscXBlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3NTAyMjYsImV4cCI6MjA4NzMyNjIyNn0.yXRTB0R54Cx5T-BTT-wDZejaUWRXZdtF0C51-9rY1HE";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const $ = id => document.getElementById(id);

function formatMoney(n){ return Number(n||0).toFixed(2); }

const monthCache = new Map();

const monthNames = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

function monthRange(yyyymm){
  const [y,m] = yyyymm.split("-").map(Number);
  const start = `${y}-${String(m).padStart(2,"0")}-01`;
  const nextM = m===12?1:m+1;
  const nextY = m===12?y+1:y;
  const end = `${nextY}-${String(nextM).padStart(2,"0")}-01`;
  return {start,end};
}

async function fetchMonthData(yyyymm){
  const {start,end} = monthRange(yyyymm);
  const key = `${start}|${end}`;
  const cached = monthCache.get(key);
  if(cached) return cached;

  const viajesQ1 = supabase
    .from("viajes")
    .select("id,fecha,inicio,destino,km,costo,created_at")
    .gte("fecha",start)
    .lt("fecha",end)
    .order("created_at", { ascending: false });

  const mantQ1 = supabase
    .from("mantenimientos")
    .select("id,fecha,descripcion,costo,created_at")
    .gte("fecha",start)
    .lt("fecha",end)
    .order("created_at", { ascending: false });

  let [{data:viajes,error:errorViajes},{data:mantenimientos,error:errorMant}] = await Promise.all([viajesQ1,mantQ1]);

  const createdAtMissing = (err) => {
    const msg = String(err?.message || "").toLowerCase();
    if(!msg.includes("created_at")) return false;
    return msg.includes("does not exist") || msg.includes("unknown") || msg.includes("column");
  };

  if(errorViajes || errorMant){
    if(createdAtMissing(errorViajes) || createdAtMissing(errorMant)){
      const viajesQ2 = supabase
        .from("viajes")
        .select("id,fecha,inicio,destino,km,costo")
        .gte("fecha",start)
        .lt("fecha",end);

      const mantQ2 = supabase
        .from("mantenimientos")
        .select("id,fecha,descripcion,costo")
        .gte("fecha",start)
        .lt("fecha",end);

      ([{data:viajes,error:errorViajes},{data:mantenimientos,error:errorMant}] = await Promise.all([viajesQ2,mantQ2]));
    }

    if(errorViajes || errorMant) throw (errorViajes || errorMant);
  }

  const result = { viajes: viajes || [], mantenimientos: mantenimientos || [] };
  monthCache.set(key,result);
  return result;
}

function yearRange(year){
  const start = `${year}-01-01`;
  const end = `${year + 1}-01-01`;
  return {start,end};
}

async function fetchYearData(year){
  const {start,end} = yearRange(year);

  const viajesQ = supabase
    .from("viajes")
    .select("id,fecha,km,costo")
    .gte("fecha",start)
    .lt("fecha",end);

  const mantQ = supabase
    .from("mantenimientos")
    .select("id,fecha,costo")
    .gte("fecha",start)
    .lt("fecha",end);

  const [{data:viajes,error:errorViajes},{data:mantenimientos,error:errorMant}] = await Promise.all([viajesQ,mantQ]);
  if(errorViajes || errorMant) throw (errorViajes || errorMant);

  return { viajes: viajes || [], mantenimientos: mantenimientos || [] };
}

function ensureDefaults(){
  const today = new Date().toISOString().slice(0,10);
  if(!$("fecha").value) $("fecha").value = today;
  if(!$("mFecha").value) $("mFecha").value = today;
  if(!$("mes").value) $("mes").value = today.slice(0,7);
  if(!$("mesHistorial").value) $("mesHistorial").value = today.slice(0,7);
  if(!$("mesMant").value) $("mesMant").value = today.slice(0,7);
  if(!$("mesHistorialMant").value) $("mesHistorialMant").value = today.slice(0,7);
  if(!$("anioResumen").value) $("anioResumen").value = new Date().getFullYear();
}

function setVistaDashboard(vista){
  const isMes = vista === "mes";
  $("pillMes").classList.toggle("active", isMes);
  $("pillAnio").classList.toggle("active", !isMes);
  $("controlsMes").classList.toggle("hidden", !isMes);
  $("controlsAnio").classList.toggle("hidden", isMes);
  $("resumen").classList.toggle("hidden", !isMes);
  $("resumenAnualTabla").classList.toggle("hidden", isMes);
}

function openHistorial(){
  $("modalHistorial").classList.add("active");
  $("mesHistorial").value = $("mes").value;
  refreshHistorial();
}

function closeHistorial(){
  $("modalHistorial").classList.remove("active");
}

async function refreshViajes(){
  let viajes = [];
  let mantenimientos = [];
  try{
    ({viajes,mantenimientos} = await fetchMonthData($("mes").value));

  }catch(e){
    $("resumen").textContent = `Error: ${e?.message || e}`;
    return;
  }

  const totalViajes = viajes.length;
  const totalKm = viajes.reduce((a,v)=>a+Number(v.km||0),0);
  const totalCostoViajes = viajes.reduce((a,v)=>a+Number(v.costo||0),0);
  const totalCostoMant = mantenimientos.reduce((a,v)=>a+Number(v.costo||0),0);
  const totalMantenimientos = mantenimientos.length;

  $("resumen").innerHTML = `
    <div class="summary-cards" style="display: flex; gap: 30px; margin-bottom: 15px;">
      <div class="summary-card" style="flex: 1; padding: 15px; border: 1px solid #ddd; border-radius: 8px; background: #f9f9f9;">
        <h4 style="margin: 0 0 10px 0; color: #333;">🏍 Viajes del mes</h4>
        <div class="summary-stats" style="display: flex; gap: 20px;">
          <div class="summary-stat">
            <div class="value" style="font-size: 24px; font-weight: bold; color: #2563eb;">${totalViajes}</div>
            <div class="label" style="font-size: 12px; color: #666;">Viajes</div>
          </div>
          <div class="summary-stat">
            <div class="value" style="font-size: 24px; font-weight: bold; color: #059669;">${totalKm.toFixed(1)}</div>
            <div class="label" style="font-size: 12px; color: #666;">Kilómetros</div>
          </div>
          <div class="summary-stat">
            <div class="value" style="font-size: 24px; font-weight: bold; color: #dc2626;">$${formatMoney(totalCostoViajes)}</div>
            <div class="label" style="font-size: 12px; color: #666;">Gasto en viajes</div>
          </div>
        </div>
      </div>
      <div class="summary-card" style="flex: 1; padding: 15px; border: 1px solid #ddd; border-radius: 8px; background: #f9f9f9;">
        <h4 style="margin: 0 0 10px 0; color: #333;">🔧 Mantenimiento del mes</h4>
        <div class="summary-stats" style="display: flex; gap: 20px;">
          <div class="summary-stat">
            <div class="value" style="font-size: 24px; font-weight: bold; color: #7c3aed;">${totalMantenimientos}</div>
            <div class="label" style="font-size: 12px; color: #666;">Servicios</div>
          </div>
          <div class="summary-stat">
            <div class="value" style="font-size: 24px; font-weight: bold; color: #dc2626;">$${formatMoney(totalCostoMant)}</div>
            <div class="label" style="font-size: 12px; color: #666;">Gasto en mantenimiento</div>
          </div>
        </div>
      </div>
    </div>
    <div style="text-align: center; padding: 10px; background: #f0f9ff; border-radius: 8px; margin-top: 10px;">
      <strong>Total gastado este mes: $${formatMoney(totalCostoViajes + totalCostoMant)}</strong>
    </div>
  `;

  const last5 = (viajes || []).slice(0,5);
  if(!last5.length){
    $("ultimosViajes").innerHTML = "";
    return;
  }

  $("ultimosViajes").innerHTML = `
    <h4 style="margin: 0 0 8px 0;">Últimos 5 viajes</h4>
    <table>
      <tr>
        <th>Fecha</th>
        <th>Ruta</th>
        <th class="right">KM</th>
        <th class="right">Costo</th>
      </tr>
      ${last5.map(v=>`
        <tr>
          <td>${v.fecha}</td>
          <td>${v.inicio} → ${v.destino}</td>
          <td class="right">${Number(v.km||0).toFixed(1)}</td>
          <td class="right">$${formatMoney(v.costo)}</td>
        </tr>
      `).join("")}
    </table>
  `;
}

async function refreshMantenimientoMes(){
  let mantenimientos = [];
  try{
    ({mantenimientos} = await fetchMonthData($("mesMant").value));
  }catch(e){
    $("resumenMant").textContent = `Error: ${e?.message || e}`;
    $("ultimosMant").innerHTML = "";
    return;
  }

  const total = mantenimientos.length;
  const totalCosto = mantenimientos.reduce((a,m)=>a+Number(m.costo||0),0);

  $("resumenMant").innerHTML = `
    <div style="padding: 10px; background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 8px;">
      <strong>Mantenimientos del mes:</strong> ${total} &nbsp; | &nbsp; <strong>Costo:</strong> $${formatMoney(totalCosto)}
    </div>
  `;

  const last5 = (mantenimientos || []).slice(0,5);
  if(!last5.length){
    $("ultimosMant").innerHTML = "";
    return;
  }

  $("ultimosMant").innerHTML = `
    <h4 style="margin: 10px 0 8px 0;">Últimos 5 mantenimientos</h4>
    <table>
      <tr>
        <th>Fecha</th>
        <th>Descripción</th>
        <th class="right">Costo</th>
      </tr>
      ${last5.map(m=>`
        <tr>
          <td>${m.fecha}</td>
          <td>${m.descripcion || ""}</td>
          <td class="right">$${formatMoney(m.costo)}</td>
        </tr>
      `).join("")}
    </table>
  `;
}

async function refreshHistorial(){
  let viajes = [];
  let mantenimientos = [];
  try{
    ({viajes,mantenimientos} = await fetchMonthData($("mesHistorial").value));

  }catch(e){
    $("tablaHistorial").innerHTML="Error";
    return;
  }

  // Combinar y ordenar por fecha
  const combinados = [];
  
  // Agregar viajes
  viajes.forEach(v => {
    combinados.push({
      created_at: v.created_at,
      fecha: v.fecha,
      tipo: 'viaje',
      icono: '🏍',
      descripcion: `${v.inicio} → ${v.destino}`,
      detalles: `${Number(v.km).toFixed(1)} km`,
      costo: v.costo,
      id: v.id,
      deleteFunc: 'deleteViaje'
    });
  });

  // Agregar mantenimientos
  mantenimientos.forEach(m => {
    combinados.push({
      created_at: m.created_at,
      fecha: m.fecha,
      tipo: 'mantenimiento',
      icono: '🔧',
      descripcion: m.descripcion,
      detalles: 'Servicio',
      costo: m.costo,
      id: m.id,
      deleteFunc: 'deleteMant'
    });
  });

  // Ordenar por orden de ingreso (último ingresado primero)
  // Fallback a fecha si created_at no está disponible.
  combinados.sort((a, b) => {
    const aKey = a.created_at || a.fecha;
    const bKey = b.created_at || b.fecha;
    return new Date(bKey) - new Date(aKey);
  });

  if(!combinados.length){ 
    $("tablaHistorial").innerHTML="Sin actividades este mes."; 
    return; 
  }

  $("tablaHistorial").innerHTML = `
    <table>
      <tr>
        <th>Fecha</th>
        <th>Actividad</th>
        <th>Detalles</th>
        <th class="right">Costo</th>
        <th></th>
      </tr>
      ${combinados.map(item=>`
        <tr style="border-left: 4px solid ${item.tipo === 'viaje' ? '#2563eb' : '#7c3aed'};">
          <td>${item.fecha}</td>
          <td>
            <span style="font-size: 16px;">${item.icono}</span>
            <strong>${item.descripcion}</strong>
          </td>
          <td>${item.detalles}</td>
          <td class="right">$${formatMoney(item.costo)}</td>
          <td><button onclick="${item.deleteFunc}('${item.id}')">X</button></td>
        </tr>`).join("")}
    </table>
  `;
}

async function refreshHistorialMant(){
  let mantenimientos = [];
  try{
    ({mantenimientos} = await fetchMonthData($("mesHistorialMant").value));
  }catch(e){
    $("tablaHistorialMant").innerHTML = `Error: ${e?.message || e}`;
    return;
  }

  if(!mantenimientos.length){
    $("tablaHistorialMant").innerHTML = "Sin mantenimientos este mes.";
    return;
  }

  $("tablaHistorialMant").innerHTML = `
    <table>
      <tr>
        <th>Fecha</th>
        <th>Descripción</th>
        <th class="right">Costo</th>
        <th></th>
      </tr>
      ${mantenimientos.map(m=>`
        <tr>
          <td>${m.fecha}</td>
          <td>${m.descripcion || ""}</td>
          <td class="right">$${formatMoney(m.costo)}</td>
          <td><button onclick="deleteMant('${m.id}')">X</button></td>
        </tr>
      `).join("")}
    </table>
  `;
}

function openHistorialMant(){
  $("modalHistorialMant").classList.add("active");
  $("mesHistorialMant").value = $("mesMant").value;
  refreshHistorialMant();
}

function closeHistorialMant(){
  $("modalHistorialMant").classList.remove("active");
}

async function refreshResumenAnualTabla(){
  const year = Number($("anioResumen").value) || new Date().getFullYear();

  let viajes = [];
  let mantenimientos = [];
  try{
    ({viajes,mantenimientos} = await fetchYearData(year));
  }catch(e){
    $("resumenAnualTabla").textContent = "Error";
    return;
  }

  const monthly = monthNames.map(label => ({
    label,
    viajes: 0,
    km: 0,
    costoViajes: 0,
    mantenimientos: 0,
    costoMant: 0
  }));

  viajes.forEach(v => {
    const idx = new Date(v.fecha).getMonth();
    const row = monthly[idx];
    row.viajes += 1;
    row.km += Number(v.km || 0);
    row.costoViajes += Number(v.costo || 0);
  });

  mantenimientos.forEach(m => {
    const idx = new Date(m.fecha).getMonth();
    const row = monthly[idx];
    row.mantenimientos += 1;
    row.costoMant += Number(m.costo || 0);
  });

  const totalViajes = monthly.reduce((a,r)=>a+r.viajes,0);
  const totalKm = monthly.reduce((a,r)=>a+r.km,0);
  const totalCostoViajes = monthly.reduce((a,r)=>a+r.costoViajes,0);
  const totalMantenimientos = monthly.reduce((a,r)=>a+r.mantenimientos,0);
  const totalCostoMant = monthly.reduce((a,r)=>a+r.costoMant,0);

  $("resumenAnualTabla").innerHTML = `
    <table>
      <tr>
        <th>Mes</th>
        <th class="right">Viajes</th>
        <th class="right">KM</th>
        <th class="right">$ Viajes</th>
        <th class="right">Mant.</th>
        <th class="right">$ Mant.</th>
        <th class="right">Total $</th>
      </tr>
      ${monthly.map(r=>{
        const total = r.costoViajes - r.costoMant;
        return `
          <tr>
            <td><strong>${r.label}</strong></td>
            <td class="right">${r.viajes}</td>
            <td class="right">${r.km.toFixed(1)}</td>
            <td class="right">$${formatMoney(r.costoViajes)}</td>
            <td class="right">${r.mantenimientos}</td>
            <td class="right">$${formatMoney(r.costoMant)}</td>
            <td class="right"><strong>$${formatMoney(total)}</strong></td>
          </tr>
        `;
      }).join("")}
      <tr>
        <th>Total</th>
        <th class="right">${totalViajes}</th>
        <th class="right">${totalKm.toFixed(1)}</th>
        <th class="right">$${formatMoney(totalCostoViajes)}</th>
        <th class="right">${totalMantenimientos}</th>
        <th class="right">$${formatMoney(totalCostoMant)}</th>
        <th class="right">$${formatMoney(totalCostoViajes - totalCostoMant)}</th>
      </tr>
    </table>
  `;
}

function setTab(tab){
  const isViajes = tab === "viajes";
  $("tabViajes").classList.toggle("active", isViajes);
  $("tabMant").classList.toggle("active", !isViajes);
  $("secViajes").classList.toggle("active", isViajes);
  $("secMant").classList.toggle("active", !isViajes);
}

$("tabViajes").onclick = ()=>setTab("viajes");
$("tabMant").onclick = ()=>setTab("mant");

$("btnSignup").onclick = async ()=>{
  const {error} = await supabase.auth.signUp({
    email: $("email").value,
    password: $("password").value
  });
  $("authMsg").textContent = error? error.message:"Cuenta creada.";
};

    password: $("password").value

  updateUI();
};

};

async function updateUI(){
  const {data:{session}} = await supabase.auth.getSession();
  const logged = !!session;
  
  // Controlar visibilidad del login y logout
  $("loginCard").style.display = logged?"none":"block";
  $("logoutSection").style.display = logged?"block":"none";
  
  // Controlar visibilidad de la app
  $("app").style.display = logged?"block":"none";
  
  if(logged){
    refreshViajes();
    refreshResumenAnualTabla();
    refreshMantenimientoMes();
  }
}

ensureDefaults();
setTab("viajes");
setVistaDashboard("mes");
updateUI();
</script>
