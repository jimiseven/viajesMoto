<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Control Moto - Viajes y Mantenimiento</title>

  <style>
    body { 
      font-family: system-ui, Arial, sans-serif; 
      margin: 10px; 
      max-width: 100%; 
      padding: 0;
    }

    h1 { margin-bottom: 5px; font-size: 24px; }
    h2 { font-size: 20px; }
    h3 { font-size: 18px; }
    h4 { font-size: 16px; }

    .row { 
      display: flex; 
      gap: 8px; 
      flex-wrap: wrap; 
      align-items: center; 
    }

    input, button, textarea { 
      padding: 12px; 
      font-size: 16px; 
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    input, textarea { 
      flex: 1; 
      min-width: 140px; 
    }

    textarea { 
      min-height: 44px; 
    }

    button { 
      cursor: pointer; 
      background: #2563eb;
      color: white;
      border: none;
      transition: background 0.2s;
    }

    button:hover {
      background: #1d4ed8;
    }

    table { 
      width: 100%; 
      border-collapse: collapse; 
      margin-top: 12px; 
      font-size: 14px;
    }

    th, td { 
      border-bottom: 1px solid #ddd; 
      padding: 10px 8px; 
      text-align: left; 
      vertical-align: top;
    }

    .card { 
      border: 1px solid #ddd; 
      border-radius: 12px; 
      padding: 15px; 
      margin: 10px 0; 
      background: white;
    }

    .muted { color: #666; font-size: 14px; }
    .danger { color: #b00020; }
    .right { text-align: right; }

    .tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tab {
      border: 1px solid #ddd;
      background: #fff;
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 14px;
      color: #111;
    }

    .tab.active {
      font-weight: bold;
      background: #2563eb;
      color: white;
      border-color: #2563eb;
    }

    .section { display: none; }
    .section.active { display: block; }

    /* Responsive improvements */
    @media (max-width: 768px) {
      body {
        margin: 5px;
        padding: 0;
      }

      h1 { font-size: 20px; }
      h2 { font-size: 18px; }
      h3 { font-size: 16px; }

      .card {
        padding: 12px;
        margin: 8px 0;
        border-radius: 8px;
      }

      .row {
        gap: 6px;
      }

      input, button, textarea {
        padding: 10px;
        font-size: 14px;
      }

      input, textarea {
        min-width: 120px;
      }

      button {
        padding: 10px 14px;
        font-size: 14px;
      }

      table {
        font-size: 12px;
      }

      th, td {
        padding: 8px 6px;
      }

      .tab {
        padding: 6px 12px;
        font-size: 12px;
      }

      .muted {
        font-size: 12px;
      }
    }

    @media (max-width: 480px) {
      body {
        margin: 2px;
      }

      h1 { font-size: 18px; }
      h2 { font-size: 16px; }
      h3 { font-size: 14px; }

      .card {
        padding: 10px;
        margin: 5px 0;
      }

      .row {
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
      }

      input, button, textarea {
        width: 100%;
        box-sizing: border-box;
      }

      input, textarea {
        min-width: auto;
      }

      button {
        padding: 12px;
        font-size: 16px;
      }

      table {
        font-size: 11px;
      }

      th, td {
        padding: 6px 4px;
      }

      .tabs {
        justify-content: center;
      }

      .tab {
        flex: 1;
        text-align: center;
        padding: 8px 4px;
        font-size: 11px;
      }
    }

    /* Responsive summary cards */
    @media (max-width: 768px) {
      .summary-cards {
        flex-direction: column !important;
        gap: 15px !important;
      }

      .summary-card {
        padding: 12px !important;
      }

      .summary-card h4 {
        font-size: 14px !important;
      }

      .summary-stats {
        gap: 15px !important;
      }

      .summary-stat {
        min-width: 80px;
      }

      .summary-stat .value {
        font-size: 20px !important;
      }

      .summary-stat .label {
        font-size: 11px !important;
      }
    }

    @media (max-width: 480px) {
      .summary-stats {
        justify-content: space-around !important;
        gap: 10px !important;
      }

      .summary-stat {
        text-align: center;
        flex: 1;
      }

      .summary-stat .value {
        font-size: 18px !important;
      }
    }
  </style>
</head>

<body>

<h1>🏍 Control de Moto</h1>
<p class="muted">Viajes + Mantenimiento (GitHub Pages + Supabase)</p>

<div class="card" id="loginCard">
  <h2>Iniciar sesión</h2>
  <div class="row">
    <input id="email" type="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Contraseña" />
    <button id="btnSignup">Crear cuenta</button>
    <button id="btnLogin">Entrar</button>
  </div>
  <p id="authMsg" class="muted"></p>
</div>

<div id="logoutSection" style="display:none; text-align: right; margin-bottom: 10px;">
  <button id="btnLogout" style="background: #dc2626;">Salir</button>
</div>

<div id="app" class="card" style="display:none;">

  <div class="row" style="justify-content: space-between;">
    <h2>Panel</h2>
    <div class="tabs">
      <button id="tabViajes" class="tab active">Viajes</button>
      <button id="tabMant" class="tab">Mantenimiento</button>
    </div>
  </div>

  <!-- ================= VIAJES ================= -->
  <div id="secViajes" class="section active">

    <h3>Registrar viaje</h3>
    <div class="row">
      <input id="fecha" type="date" />
      <input id="inicio" placeholder="Inicio" />
      <input id="destino" placeholder="Destino" />
      <input id="km" type="number" step="0.1" placeholder="KM" />
      <input id="costo" type="number" step="0.01" placeholder="Costo" />
      <button id="btnAdd">Guardar</button>
    </div>

    <h3 style="margin-top:20px;">Resumen mensual</h3>
    <div class="row">
      <input id="mes" type="month" />
      <button id="btnRefresh">Actualizar</button>
    </div>

    <div id="resumen" class="muted" style="margin-top:10px;"></div>

    <h3 style="margin-top:20px;">Historial completo</h3>
    <div class="row" style="margin-bottom: 10px;">
      <input id="mesHistorial" type="month" />
      <button id="btnRefreshHistorial">Actualizar</button>
    </div>
    <div id="tablaHistorial"></div>
  </div>

  <!-- ================= MANTENIMIENTO ================= -->
  <div id="secMant" class="section">

    <h3>Registrar mantenimiento</h3>
    <div class="row">
      <input id="mFecha" type="date" />
      <textarea id="mDesc" placeholder="¿Qué se hizo?"></textarea>
      <input id="mCosto" type="number" step="0.01" placeholder="Costo" />
      <button id="btnAddMant">Guardar</button>
    </div>
  </div>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://punkkhbrdczughyplqpe.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1bmtraGJyZGN6dWdoeXBscXBlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3NTAyMjYsImV4cCI6MjA4NzMyNjIyNn0.yXRTB0R54Cx5T-BTT-wDZejaUWRXZdtF0C51-9rY1HE";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const $ = id => document.getElementById(id);

function formatMoney(n){ return Number(n||0).toFixed(2); }

const monthCache = new Map();

async function fetchMonthData(yyyymm){
  const {start,end} = monthRange(yyyymm);
  const key = `${start}|${end}`;
  const cached = monthCache.get(key);
  if(cached) return cached;

  const viajesQ = supabase
    .from("viajes")
    .select("id,fecha,inicio,destino,km,costo")
    .gte("fecha",start)
    .lt("fecha",end);

  const mantQ = supabase
    .from("mantenimientos")
    .select("id,fecha,descripcion,costo")
    .gte("fecha",start)
    .lt("fecha",end);

  const [{data:viajes,error:errorViajes},{data:mantenimientos,error:errorMant}] = await Promise.all([viajesQ,mantQ]);
  if(errorViajes || errorMant) throw (errorViajes || errorMant);

  const result = { viajes: viajes || [], mantenimientos: mantenimientos || [] };
  monthCache.set(key,result);
  return result;
}

function ensureDefaults(){
  const today = new Date().toISOString().slice(0,10);
  if(!$("fecha").value) $("fecha").value = today;
  if(!$("mFecha").value) $("mFecha").value = today;
  if(!$("mes").value) $("mes").value = today.slice(0,7);
  if(!$("mesHistorial").value) $("mesHistorial").value = today.slice(0,7);
}

function monthRange(yyyymm){
  const [y,m] = yyyymm.split("-").map(Number);
  const start = `${y}-${String(m).padStart(2,"0")}-01`;
  const nextM = m===12?1:m+1;
  const nextY = m===12?y+1:y;
  const end = `${nextY}-${String(nextM).padStart(2,"0")}-01`;
  return {start,end};
}

function setTab(tab){
  const isViajes = tab==="viajes";
  $("tabViajes").classList.toggle("active",isViajes);
  $("tabMant").classList.toggle("active",!isViajes);
  $("secViajes").classList.toggle("active",isViajes);
  $("secMant").classList.toggle("active",!isViajes);
}

async function refreshViajes(){
  let viajes = [];
  let mantenimientos = [];
  try{
    ({viajes,mantenimientos} = await fetchMonthData($("mes").value));
  }catch(e){
    $("resumen").textContent = "Error";
    return;
  }

  const totalViajes = viajes.length;
  const totalKm = viajes.reduce((a,v)=>a+Number(v.km||0),0);
  const totalCostoViajes = viajes.reduce((a,v)=>a+Number(v.costo||0),0);
  const totalCostoMant = mantenimientos.reduce((a,v)=>a+Number(v.costo||0),0);
  const totalMantenimientos = mantenimientos.length;

  $("resumen").innerHTML = `
    <div class="summary-cards" style="display: flex; gap: 30px; margin-bottom: 15px;">
      <div class="summary-card" style="flex: 1; padding: 15px; border: 1px solid #ddd; border-radius: 8px; background: #f9f9f9;">
        <h4 style="margin: 0 0 10px 0; color: #333;">🏍 Viajes del mes</h4>
        <div class="summary-stats" style="display: flex; gap: 20px;">
          <div class="summary-stat">
            <div class="value" style="font-size: 24px; font-weight: bold; color: #2563eb;">${totalViajes}</div>
            <div class="label" style="font-size: 12px; color: #666;">Viajes</div>
          </div>
          <div class="summary-stat">
            <div class="value" style="font-size: 24px; font-weight: bold; color: #059669;">${totalKm.toFixed(1)}</div>
            <div class="label" style="font-size: 12px; color: #666;">Kilómetros</div>
          </div>
          <div class="summary-stat">
            <div class="value" style="font-size: 24px; font-weight: bold; color: #dc2626;">$${formatMoney(totalCostoViajes)}</div>
            <div class="label" style="font-size: 12px; color: #666;">Gasto en viajes</div>
          </div>
        </div>
      </div>
      <div class="summary-card" style="flex: 1; padding: 15px; border: 1px solid #ddd; border-radius: 8px; background: #f9f9f9;">
        <h4 style="margin: 0 0 10px 0; color: #333;">🔧 Mantenimiento del mes</h4>
        <div class="summary-stats" style="display: flex; gap: 20px;">
          <div class="summary-stat">
            <div class="value" style="font-size: 24px; font-weight: bold; color: #7c3aed;">${totalMantenimientos}</div>
            <div class="label" style="font-size: 12px; color: #666;">Servicios</div>
          </div>
          <div class="summary-stat">
            <div class="value" style="font-size: 24px; font-weight: bold; color: #dc2626;">$${formatMoney(totalCostoMant)}</div>
            <div class="label" style="font-size: 12px; color: #666;">Gasto en mantenimiento</div>
          </div>
        </div>
      </div>
    </div>
    <div style="text-align: center; padding: 10px; background: #f0f9ff; border-radius: 8px; margin-top: 10px;">
      <strong>Total gastado este mes: $${formatMoney(totalCostoViajes + totalCostoMant)}</strong>
    </div>
  `;
}

async function refreshHistorial(){
  let viajes = [];
  let mantenimientos = [];
  try{
    ({viajes,mantenimientos} = await fetchMonthData($("mesHistorial").value));
  }catch(e){
    $("tablaHistorial").innerHTML="Error";
    return;
  }

  // Combinar y ordenar por fecha
  const combinados = [];
  
  // Agregar viajes
  viajes.forEach(v => {
    combinados.push({
      fecha: v.fecha,
      tipo: 'viaje',
      icono: '🏍',
      descripcion: `${v.inicio} → ${v.destino}`,
      detalles: `${Number(v.km).toFixed(1)} km`,
      costo: v.costo,
      id: v.id,
      deleteFunc: 'deleteViaje'
    });
  });

  // Agregar mantenimientos
  mantenimientos.forEach(m => {
    combinados.push({
      fecha: m.fecha,
      tipo: 'mantenimiento',
      icono: '🔧',
      descripcion: m.descripcion,
      detalles: 'Servicio',
      costo: m.costo,
      id: m.id,
      deleteFunc: 'deleteMant'
    });
  });

  // Ordenar por fecha (más reciente primero)
  combinados.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));

  if(!combinados.length){ 
    $("tablaHistorial").innerHTML="Sin actividades este mes."; 
    return; 
  }

  $("tablaHistorial").innerHTML = `
    <table>
      <tr>
        <th>Fecha</th>
        <th>Actividad</th>
        <th>Detalles</th>
        <th class="right">Costo</th>
        <th></th>
      </tr>
      ${combinados.map(item=>`
        <tr style="border-left: 4px solid ${item.tipo === 'viaje' ? '#2563eb' : '#7c3aed'};">
          <td>${item.fecha}</td>
          <td>
            <span style="font-size: 16px;">${item.icono}</span>
            <strong>${item.descripcion}</strong>
          </td>
          <td>${item.detalles}</td>
          <td class="right">$${formatMoney(item.costo)}</td>
          <td><button onclick="${item.deleteFunc}('${item.id}')">X</button></td>
        </tr>`).join("")}
    </table>
  `;
}

window.deleteViaje = async id=>{
  await supabase.from("viajes").delete().eq("id",id);
  monthCache.clear();
  refreshViajes();
  refreshHistorial();
};

window.deleteMant = async id=>{
  await supabase.from("mantenimientos").delete().eq("id",id);
  monthCache.clear();
  refreshHistorial();
};

$("btnAdd").onclick = async ()=>{
  const {data:{session}} = await supabase.auth.getSession();
  if(!session) return alert("Debes iniciar sesión");

  await supabase.from("viajes").insert({
    user_id: session.user.id,
    fecha: $("fecha").value,
    inicio: $("inicio").value,
    destino: $("destino").value,
    km: Number($("km").value),
    costo: Number($("costo").value)
  });

  $("inicio").value="";
  $("destino").value="";
  $("km").value="";
  $("costo").value="";
  monthCache.clear();
  refreshViajes();
  refreshHistorial();
};

$("btnAddMant").onclick = async ()=>{
  const {data:{session}} = await supabase.auth.getSession();
  if(!session) return alert("Debes iniciar sesión");

  await supabase.from("mantenimientos").insert({
    user_id: session.user.id,
    fecha: $("mFecha").value,
    descripcion: $("mDesc").value,
    costo: Number($("mCosto").value)
  });

  $("mDesc").value="";
  $("mCosto").value="";
  monthCache.clear();
  refreshHistorial();
};

$("btnRefresh").onclick = refreshViajes;
$("btnRefreshHistorial").onclick = refreshHistorial;

$("tabViajes").onclick = ()=>setTab("viajes");
$("tabMant").onclick = ()=>setTab("mant");

$("btnSignup").onclick = async ()=>{
  const {error} = await supabase.auth.signUp({
    email: $("email").value,
    password: $("password").value
  });
  $("authMsg").textContent = error? error.message:"Cuenta creada.";
};

$("btnLogin").onclick = async ()=>{
  const {error} = await supabase.auth.signInWithPassword({
    email: $("email").value,
    password: $("password").value
  });
  $("authMsg").textContent = error? error.message:"Sesión iniciada.";
  updateUI();
};

$("btnLogout").onclick = async ()=>{
  await supabase.auth.signOut();
  updateUI();
};

async function updateUI(){
  const {data:{session}} = await supabase.auth.getSession();
  const logged = !!session;
  
  // Controlar visibilidad del login y logout
  $("loginCard").style.display = logged?"none":"block";
  $("logoutSection").style.display = logged?"block":"none";
  
  // Controlar visibilidad de la app
  $("app").style.display = logged?"block":"none";
  
  if(logged){
    refreshViajes();
    refreshHistorial();
  }
}

ensureDefaults();
updateUI();
</script>

</body>
</html>
